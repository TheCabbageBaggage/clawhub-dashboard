<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medium Project — Applied AI</title>
<style>
:root,
[data-theme="dark"] {
  --bg: #0a0e14; --bg2: #11161e; --bg3: #1a2230;
  --card: #141c26; --card-hover: #1a2432;
  --primary: #2C5F7C; --primary-glow: rgba(44,95,124,0.25);
  --secondary: #1A3440; --accent: #3D8B8B;
  --accent-glow: rgba(61,139,139,0.2);
  --text: #e0e4ea; --text2: #8892a8; --text3: #5a6478;
  --success: #10b981; --warn: #f59e0b; --danger: #ef4444;
  --border: rgba(255,255,255,0.06); --border2: rgba(255,255,255,0.1);
  --radius: 16px; --radius-sm: 10px; --radius-xs: 6px;
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
  --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
  --nav-bg: rgba(10,14,20,0.85);
  --hero-gradient: linear-gradient(135deg, #1A3440 0%, #2C5F7C 100%);
  --hero-text: #fff; --hero-text2: rgba(255,255,255,0.7);
  --outline-bg: #0d1117; --outline-border: rgba(255,255,255,0.08);
  --code-bg: #161b22;
}

[data-theme="light"] {
  --bg: #f5f6f8; --bg2: #ffffff; --bg3: #e8ecf1;
  --card: #ffffff; --card-hover: #f0f3f6;
  --primary: #2C5F7C; --primary-glow: rgba(44,95,124,0.12);
  --secondary: #1A3440; --accent: #2C5F7C;
  --accent-glow: rgba(44,95,124,0.1);
  --text: #1a1d27; --text2: #5a6478; --text3: #8892a8;
  --success: #10b981; --warn: #f59e0b; --danger: #ef4444;
  --border: rgba(0,0,0,0.08); --border2: rgba(0,0,0,0.12);
  --shadow: 0 2px 16px rgba(0,0,0,0.06);
  --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
  --nav-bg: rgba(245,246,248,0.9);
  --hero-gradient: linear-gradient(135deg, #1A3440 0%, #2C5F7C 100%);
  --hero-text: #fff; --hero-text2: rgba(255,255,255,0.7);
  --outline-bg: #f8f9fb; --outline-border: rgba(0,0,0,0.08);
  --code-bg: #f0f2f5;
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body {
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

.nav {
  position: sticky; top:0; z-index:100;
  background: var(--nav-bg);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border-bottom: 1px solid var(--border);
  padding: 0 1.5rem; display: flex; align-items: center; justify-content: space-between;
  height: 60px;
}
.nav-brand { display: flex; align-items: center; gap: 0.6rem; }
.nav-brand a {
  text-decoration: none; color: var(--text2); font-size: 1.1rem;
  padding: 0.3rem 0.5rem; border-radius: 6px; transition: var(--transition);
}
.nav-brand a:hover { background: var(--bg3); color: var(--accent); }
.nav-brand .title { font-size: 1.1rem; font-weight: 700; color: var(--accent); letter-spacing: -0.02em; }
.nav-right { display: flex; align-items: center; gap: 0.6rem; }
.theme-toggle {
  width: 34px; height: 34px; border-radius: 8px;
  border: 1px solid var(--border); background: var(--card);
  color: var(--text2); font-size: 1rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: var(--transition);
}
.theme-toggle:hover { border-color: var(--accent); color: var(--accent); }

.hero {
  background: var(--hero-gradient); padding: 2rem 2rem; text-align: center;
  position: relative; overflow: hidden;
}
.hero::after {
  content: ''; position: absolute; top: -40%; right: -20%;
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(61,139,139,0.12) 0%, transparent 70%);
  pointer-events: none;
}
.hero h1 { font-size: clamp(1.5rem, 3vw, 2rem); font-weight: 700; color: var(--hero-text); letter-spacing: -0.03em; }
.hero p { font-size: 0.9rem; color: var(--hero-text2); margin-top: 0.4rem; }

.main { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }

/* Stats bar */
.stats-bar {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 0.75rem; margin-bottom: 2rem;
}
.stat-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 1rem; text-align: center;
}
.stat-card .val { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
.stat-card .lbl { font-size: 0.7rem; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 0.2rem; }

/* Article grid */
.section-label {
  font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.2px;
  color: var(--text3); margin: 1.5rem 0 0.75rem; padding-left: 4px;
}
.article-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 1rem;
  margin-bottom: 1.5rem;
}
.article-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 1.5rem;
  cursor: pointer; transition: var(--transition);
  position: relative; overflow: hidden;
}
.article-card:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
  box-shadow: 0 6px 20px var(--accent-glow);
}
.article-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--accent));
  opacity: 0; transition: opacity 0.2s;
}
.article-card:hover::before { opacity: 1; }
.article-card .cat-tag {
  display: inline-block; font-size: 0.65rem; padding: 0.2rem 0.6rem;
  border-radius: 10px; margin-bottom: 0.75rem;
  background: var(--bg3); color: var(--text3);
}
.article-card h2 {
  font-size: 1rem; font-weight: 600; color: var(--text);
  line-height: 1.4; margin-bottom: 0.4rem;
}
.article-card .subtitle {
  font-size: 0.8rem; color: var(--text2); line-height: 1.5;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}
.article-meta {
  display: flex; align-items: center; gap: 0.75rem; margin-top: 1rem;
  flex-wrap: wrap;
}
.article-meta .status-badge {
  font-size: 0.65rem; padding: 0.25rem 0.6rem; border-radius: 10px; font-weight: 500;
}
.status-ready { background: rgba(16,185,129,0.1); color: var(--success); border: 1px solid rgba(16,185,129,0.2); }
.status-draft { background: rgba(245,158,11,0.1); color: var(--warn); border: 1px solid rgba(245,158,11,0.2); }
.status-concept { background: rgba(99,102,241,0.1); color: #818cf8; border: 1px solid rgba(99,102,241,0.2); }
.status-analysis { background: rgba(61,139,139,0.12); color: var(--accent); border: 1px solid rgba(61,139,139,0.2); }
.article-meta .line-count {
  font-size: 0.7rem; color: var(--text3);
}
.article-meta .has-draft {
  font-size: 0.65rem; color: var(--success);
}

/* Outline modal */
.modal-overlay {
  position: fixed; inset:0; z-index:200;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn {
  from { opacity:0; }
  to { opacity:1; }
}
.modal {
  background: var(--bg2); border: 1px solid var(--border2);
  border-radius: var(--radius); max-width: 900px; width: 92vw;
  max-height: 88vh; display: flex; flex-direction: column;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
.modal-header {
  position: sticky; top:0; z-index:10;
  background: var(--bg2); padding: 1.25rem 1.5rem;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  border-radius: var(--radius) var(--radius) 0 0;
}
.modal-header h3 { font-size: 1.05rem; color: var(--accent); font-weight: 600; }
.modal-close {
  background: var(--bg3); border: none; color: var(--text2);
  width: 32px; height: 32px; border-radius: 8px;
  cursor: pointer; font-size: 1.1rem; transition: var(--transition);
  flex-shrink: 0;
}
.modal-close:hover { background: var(--danger); color: #fff; }
.modal-body {
  padding: 1.5rem; overflow-y: auto; flex: 1;
}
.modal-body .outline-content {
  background: var(--outline-bg); border: 1px solid var(--outline-border);
  border-radius: var(--radius-sm); padding: 1.5rem;
  font-size: 0.85rem; line-height: 1.7;
  white-space: pre-wrap;
  font-family: 'SF Mono', 'Menlo', 'Monaco', 'Consolas', monospace;
  color: var(--text);
  overflow-x: auto;
}
.modal-body .outline-content h1,
.modal-body .outline-content h2,
.modal-body .outline-content h3 {
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  color: var(--accent); margin-top: 1.5rem; margin-bottom: 0.5rem;
}
.modal-body .outline-content h1 { font-size: 1.3rem; }
.modal-body .outline-content h2 { font-size: 1.1rem; }
.modal-body .outline-content h3 { font-size: 0.95rem; }
.modal-body .outline-content strong { color: var(--text); }
.modal-body .outline-content code {
  background: var(--code-bg); padding: 0.15rem 0.4rem;
  border-radius: 4px; font-size: 0.8rem;
}

.footer { text-align: center; padding: 2rem; color: var(--text3); font-size: 0.72rem; border-top: 1px solid var(--border); }
.footer a { color: var(--text3); text-decoration: none; }
.footer a:hover { color: var(--accent); }

@media (max-width: 768px) {
  .nav { padding: 0 1rem; height: 54px; }
  .hero { padding: 1.5rem 1rem; }
  .main { padding: 1.5rem 1rem; }
  .article-grid { grid-template-columns: 1fr; }
  .modal { width: 96vw; max-height: 92vh; }
}
@media (max-width: 480px) {
  .stats-bar { grid-template-columns: 1fr 1fr; }
}
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 3px; }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-brand">
    <a href="/" title="Back to Dashboard">←</a>
    <span class="title">✍️ Medium Project</span>
  </div>
  <div class="nav-right">
    <button class="theme-toggle" id="themeToggle" title="Toggle theme" aria-label="Toggle theme">☀️</button>
  </div>
</nav>

<div class="hero">
  <h1>Applied AI — Medium Publication</h1>
  <p>Engineering-first. Nordic-minimal. Transparent. Builder, not marketer.</p>
</div>

<div class="main">
  <div class="stats-bar" id="statsBar"></div>
  <div class="section-label">📝 Articles & Content</div>
  <div class="article-grid" id="articleGrid"></div>
</div>

<div class="footer">
  Medium Project · Applied AI Publication · <a href="https://github.com/TheCabbageBaggage/openclaw-workspace/tree/main/projects/medium-articles" target="_blank" rel="noopener">GitHub ↗</a>
</div>

<div id="modalContainer"></div>

<script>
let articles = [];

async function loadData() {
  try {
    const r = await fetch('/briefing/data/medium_articles.json');
    articles = await r.json();
    renderStats();
    renderArticles();
  } catch(e) {
    document.querySelector('.main').innerHTML =
      '<div style="text-align:center;padding:3rem;color:var(--text2)">⚠️ Could not load article data.</div>';
  }
}

function renderStats() {
  const ready = articles.filter(a => a.status.includes('Ready') || a.status === 'Draft').length;
  const drafts = articles.filter(a => a.hasDraft).length;
  const totalLines = articles.reduce((s, a) => s + a.outlineLines, 0);
  const categories = [...new Set(articles.map(a => a.category))].length;

  document.getElementById('statsBar').innerHTML = `
    <div class="stat-card"><div class="val">${articles.length}</div><div class="lbl">Articles</div></div>
    <div class="stat-card"><div class="val">${ready}</div><div class="lbl">Ready / Draft</div></div>
    <div class="stat-card"><div class="val">${drafts}</div><div class="lbl">Full Drafts</div></div>
    <div class="stat-card"><div class="val">${totalLines}</div><div class="lbl">Outline Lines</div></div>
    <div class="stat-card"><div class="val">${categories}</div><div class="lbl">Categories</div></div>
  `;
}

function statusClass(status) {
  if (status.includes('Ready')) return 'status-ready';
  if (status === 'Draft') return 'status-draft';
  if (status === 'Concept') return 'status-concept';
  return 'status-analysis';
}

function renderArticles() {
  document.getElementById('articleGrid').innerHTML = articles.map(a => `
    <div class="article-card" onclick="openOutline('${a.id}')">
      <span class="cat-tag">${a.category}</span>
      <h2>${escHtml(a.title)}</h2>
      <div class="subtitle">${escHtml(a.subtitle)}</div>
      <div class="article-meta">
        <span class="status-badge ${statusClass(a.status)}">${a.status}</span>
        <span class="line-count">${a.outlineLines} lines</span>
        ${a.hasDraft ? '<span class="has-draft">📄 Full draft</span>' : ''}
        ${a.target ? '<span class="line-count">🎯 ' + escHtml(a.target) + '</span>' : ''}
      </div>
    </div>
  `).join('');
}

function openOutline(id) {
  const a = articles.find(a => a.id === id);
  if (!a) return;

  let html = renderMarkdown(a.outline);

  document.getElementById('modalContainer').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="modal-header">
          <h3>${escHtml(a.title)}</h3>
          <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-body">
          <div style="display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:1rem;">
            <span class="status-badge ${statusClass(a.status)}">${a.status}</span>
            <span style="font-size:0.8rem;color:var(--text3);">${a.category}</span>
            <span style="font-size:0.8rem;color:var(--text3);">${a.outlineLines} lines</span>
            ${a.target ? '<span style="font-size:0.8rem;color:var(--text3);">🎯 ' + escHtml(a.target) + '</span>' : ''}
            ${a.hasDraft ? '<span style="font-size:0.8rem;color:var(--success);">📄 Full draft available</span>' : ''}
          </div>
          <div class="outline-content">${html}</div>
        </div>
      </div>
    </div>`;
}

function renderMarkdown(md) {
  // Escape HTML first
  let h = md.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

  // Code blocks (must be first)
  h = h.replace(/```(\w*)\n([\s\S]*?)```/g, function(_, lang, code) {
    return '<pre style="background:var(--code-bg,#161b22);padding:1rem;border-radius:8px;overflow-x:auto;font-size:0.85rem;margin:0.75rem 0;"><code>' + code.trim() + '</code></pre>';
  });

  // Inline code
  h = h.replace(/`([^`]+)`/g, '<code style="background:var(--bg3);padding:2px 6px;border-radius:4px;font-size:0.9em;">$1</code>');

  // Headers
  h = h.replace(/^#### (.+)$/gm, '<h4 style="font-size:1rem;margin:1rem 0 0.5rem;">$1</h4>');
  h = h.replace(/^### (.+)$/gm, '<h3 style="font-size:1.1rem;margin:1.25rem 0 0.5rem;">$1</h3>');
  h = h.replace(/^## (.+)$/gm, '<h2 style="font-size:1.25rem;margin:1.5rem 0 0.5rem;color:var(--text);">$1</h2>');
  h = h.replace(/^# (.+)$/gm, '<h1 style="font-size:1.5rem;margin:1.5rem 0 0.75rem;color:var(--text);">$1</h1>');

  // Bold and italic
  h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  h = h.replace(/\*(.+?)\*/g, '<em>$1</em>');

  // Links
  h = h.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener" style="color:var(--accent);">$1</a>');

  // Images
  h = h.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1" style="max-width:100%;border-radius:8px;margin:0.5rem 0;">');

  // Horizontal rules
  h = h.replace(/^---$/gm, '<hr style="border:0;border-top:1px solid var(--border);margin:1.5rem 0;">');

  // Blockquotes
  h = h.replace(/^&gt; (.+)$/gm, '<blockquote style="border-left:3px solid var(--accent);padding:0.5rem 1rem;color:var(--text2);margin:0.75rem 0;">$1</blockquote>');

  // Tables — detect consecutive pipe-delimited rows with separator
  h = h.replace(/((?:^\|.+\|$\n?)+)/gm, function(match) {
    var rows = match.trim().split(/\n/);
    if (rows.length < 2) return match;
    var sepIdx = -1;
    for (var i = 0; i < rows.length; i++) {
      if (/^\|[\s\-:]+\|$/.test(rows[i]) || /^\|[-:|\s]+$/.test(rows[i])) {
        sepIdx = i;
        break;
      }
    }
    if (sepIdx < 0) return match;
    var headerCells = rows[0].split('|').filter(function(c) { return c.trim(); });
    var html = '<table style="width:100%;border-collapse:collapse;margin:0.75rem 0;font-size:0.85rem;">';
    html += '<thead><tr>';
    headerCells.forEach(function(c) {
      html += '<th style="border:1px solid var(--border);padding:8px 12px;text-align:left;background:var(--bg3);font-weight:600;color:var(--text);">' + c.trim() + '</th>';
    });
    html += '</tr></thead><tbody>';
    for (var i = sepIdx + 1; i < rows.length; i++) {
      var cells = rows[i].split('|').filter(function(c) { return c.trim(); });
      html += '<tr>';
      cells.forEach(function(c) {
        html += '<td style="border:1px solid var(--border);padding:8px 12px;text-align:left;color:var(--text);">' + c.trim() + '</td>';
      });
      html += '</tr>';
    }
    html += '</tbody></table>';
    return html;
  });

  // Unordered lists
  h = h.replace(/^- (.+)$/gm, '<li>$1</li>');
  h = h.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul style="padding-left:1.5rem;margin:0.5rem 0;">$1</ul>');

  // Ordered lists
  h = h.replace(/^(\d+)\. (.+)$/gm, '<li>$1. $2</li>');
  h = h.replace(/((?:<li>\d+\. .*<\/li>\n?)+)/g, '<ol style="padding-left:1.5rem;margin:0.5rem 0;">$1</ol>');

  // Paragraphs
  h = h.replace(/\n\n+/g, '</p><p>');
  h = '<p>' + h + '</p>';

  // Cleanup
  h = h.replace(/<p><\/p>/g, '');
  h = h.replace(/<p>(<(h[1-4]|pre|hr|blockquote|ul|ol|table)>)/g, '$1');
  h = h.replace(/(<\/(h[1-4]|pre|blockquote|ul|ol|table)>)(<\/p>)/g, '$1');

  return h;
}

function closeModal() {
  document.getElementById('modalContainer').innerHTML = '';
}

function escHtml(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

// Theme
function initTheme() {
  const saved = localStorage.getItem('dashboard-theme') || 'dark';
  applyTheme(saved);
}
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  const btn = document.getElementById('themeToggle');
  if (btn) btn.textContent = theme === 'light' ? '🌙' : '☀️';
  localStorage.setItem('dashboard-theme', theme);
}
document.getElementById('themeToggle').addEventListener('click', () => {
  const current = document.documentElement.getAttribute('data-theme') || 'dark';
  applyTheme(current === 'dark' ? 'light' : 'dark');
});

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
initTheme();
loadData();
</script>
</body>
</html>

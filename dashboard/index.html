<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 Operations Hub - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1117;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            background: #1a1d27;
            border: 1px solid #2a2d3a;
            border-radius: 20px;
            padding: 48px;
            width: 100%;
            max-width: 420px;
            text-align: center;
        }
        .logo { font-size: 4rem; margin-bottom: 20px; }
        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle { color: #888; margin-bottom: 36px; font-size: 0.9rem; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label {
            display: block;
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        input[type="password"] {
            width: 100%;
            padding: 14px 16px;
            background: #252836;
            border: 1px solid #333;
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.2s;
        }
        input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3); }
        .login-btn:active { transform: translateY(0); }
        .error {
            background: rgba(244, 67, 54, 0.1);
            border: 1px solid rgba(244, 67, 54, 0.3);
            color: #f44336;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            display: none;
        }
        .footer {
            margin-top: 30px;
            color: #555;
            font-size: 0.75rem;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">🚀</div>
        <h1>Operations Hub</h1>
        <p class="subtitle">Enter password to access the dashboard</p>
        
        <div class="error" id="error-msg">Incorrect password. Please try again.</div>
        
        <form id="login-form" onsubmit="return handleLogin(event)">
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter password" required autofocus>
            </div>
            <button type="submit" class="login-btn">Login</button>
        </form>
        
        <div class="footer">
            Protected by Clowie AI · <a href="mailto:clowie_claw@agentmail.to" style="color: #667eea;">Contact Support</a>
        </div>
    </div>
    
    <script>
    function handleLogin(e) {
        e.preventDefault();
        const password = document.getElementById('password').value;
        
        // Simple client-side check - sets session storage
        // For real security, use server-side validation
        if (password === 'Clowie2026!') {
            sessionStorage.setItem('ops_auth', 'true');
            sessionStorage.setItem('ops_auth_time', Date.now().toString());
            window.location.href = '/dashboard.html';
        } else {
            document.getElementById('error-msg').style.display = 'block';
            document.getElementById('password').value = '';
            document.getElementById('password').focus();
        }
        return false;
    }
    </script>
</body>
</html>
